# ===================================================================
# RSUD Kerjasama - Application Configuration
# ===================================================================

# --- Database ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=neondb_owner
quarkus.datasource.password=npg_5zr4wAxUobCq
quarkus.datasource.jdbc.url=jdbc:postgresql://ep-quiet-flower-a1dwdupc.ap-southeast-1.aws.neon.tech:5432/neondb

# --- Hibernate ORM ---
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.physical-naming-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# --- JWT Security ---
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=rsud-kerjasama
smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.lifespan=86400
smallrye.jwt.new-token.issuer=rsud-kerjasama

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true

# --- Mailer ---
quarkus.mailer.from=noreply@rsud-soedono.go.id
quarkus.mailer.host=smtp.example.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=your-email@example.com
quarkus.mailer.password=your-password
quarkus.mailer.mock=true

# --- File Upload ---
app.upload.dir=./uploads
quarkus.http.limits.max-body-size=10M

# --- HTTP ---
quarkus.http.port=8080

# --- Logging ---
quarkus.log.level=INFO
quarkus.log.category."id.rsud.kerjasama".level=DEBUG
